<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitGrab - GitHub Repo İndirici</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="bg-gradient"></div>
    <div class="bg-grid"></div>
    <div class="floating-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
        <div class="orb orb-4"></div>
    </div>

    <header class="navbar" id="navbar">
        <div class="nav-container">
            <a href="#" class="logo">
                <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/>
                </svg>
                <span class="logo-text">Git<span class="logo-accent">Grab</span></span>
            </a>
            <nav class="nav-links">
                <a href="#search-section" class="nav-link">Ara</a>
                <a href="#trending-section" class="nav-link">Trend</a>
                <a href="#features-section" class="nav-link">Özellikler</a>
            </nav>
        </div>
    </header>

    <section class="hero" id="hero">
        <div class="hero-content">
            <div class="hero-badge">
                <span class="badge-dot"></span>
                <span>Açık Kaynak Keşfet</span>
            </div>
            <h1 class="hero-title">GitHub Projelerini<br><span class="gradient-text">Kolayca İndir</span></h1>
            <p class="hero-subtitle">Milyonlarca açık kaynak projeyi arayın ve tek tıkla indirin.</p>
            
            <div class="hero-search" id="search-section">
                <div class="search-wrapper">
                    <input type="text" id="searchInput" class="search-input" placeholder="Repo adı veya kullanıcı ara..." autocomplete="off">
                    <button id="searchBtn" class="search-btn"><span>Ara</span></button>
                </div>
            </div>
        </div>
    </section>

    <section class="results-section" id="results-section">
        <div class="results-container">
            <div id="resultsGrid" class="results-grid"></div>
            <div id="loadingSpinner" style="display:none;">Yükleniyor...</div>
        </div>
    </section>

    <script src="./script.js"></script>
</body>
</html>
