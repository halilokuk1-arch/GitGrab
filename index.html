<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitGrab - GitHub Repo İndirici</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="bg-gradient"></div>
    <div class="bg-grid"></div>
    <div class="floating-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <header class="navbar">
        <div class="nav-container">
            <a href="#" class="logo">
                <span class="logo-text">Git<span class="logo-accent">Grab</span></span>
            </a>
            <nav class="nav-links">
                <a href="#search-section" class="nav-link">Ara</a>
                <a href="#trending-section" class="nav-link">Trend</a>
            </nav>
        </div>
    </header>

    <section class="hero">
        <div class="hero-content">
            <div class="hero-badge"><span>Açık Kaynak Keşfet</span></div>
            <h1 class="hero-title">GitHub Projelerini <br><span class="gradient-text">Kolayca İndir</span></h1>
            
            <div class="hero-search" id="search-section">
                <div class="search-wrapper">
                    <input type="text" id="searchInput" class="search-input" placeholder="Repo adı veya kullanıcı ara...">
                    <button id="searchBtn" class="search-btn">Ara</button>
                </div>
                <div class="search-tags">
                    <span class="tag-label">Popüler:</span>
                    <button class="search-tag" data-query="react">React</button>
                    <button class="search-tag" data-query="python">Python</button>
                    <button class="search-tag" data-query="nextjs">Next.js</button>
                </div>
            </div>
        </div>
    </section>

    <section class="results-section">
        <div class="results-container">
            <div id="resultsGrid" class="results-grid">
                </div>
        </div>
    </section>

    <script src="./script.js"></script>
</body>
</html>
