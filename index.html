<html lang="en">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GitGrab — Discover Open Source</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080c10;
    --surface: #0d1117;
    --surface2: #161b22;
    --surface3: #21262d;
    --border: #30363d;
    --accent: #f0883e;
    --accent2: #58a6ff;
    --green: #3fb950;
    --purple: #bc8cff;
    --red: #ff7b72;
    --text: #e6edf3;
    --muted: #8b949e;
    --dim: #484f58;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    overflow-x: hidden;
    cursor: none;
  }
  .cursor {
    width: 12px; height: 12px;

    border-radius: 50%;
    position: fixed;
    pointer-events: none;
    z-index: 9999;
    transition: transform 0.1s ease, background 0.2s;
    transform: translate(-50%, -50%);
  }
  .cursor-ring {
    width: 36px; height: 36px;

    z-index: 9998;

    transform: translate(-50%, -50%);
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:

    z-index: 0;
  }

    align-items: center;
    justify-content: space-between;

    background: rgba(8,12,16,0.8);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid rgba(48,54,61,0.5);
  }
  .logo {

    font-size: 22px;
    font-weight: 800;
    letter-spacing: -1px;
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
    color: var(--text);
  }
  .logo-icon {
    width: 32px; height: 32px;

    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
  }
  .logo span { color: var(--accent); }
  nav ul { list-style: none; display: flex; gap: 32px; }
  nav ul a {
    color: var(--muted);

    font-size: 13px;
    letter-spacing: 0.5px;
    transition: color 0.2s;
  }
  nav ul a:hover { color: var(--text); }
  .nav-cta {
    background: var(--accent) !important;
    color: #000 !important;
    padding: 8px 18px;
    border-radius: 6px;
    font-weight: 500;
  }
  .hero {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 120px 40px 80px;
    text-align: center;
    overflow: hidden;
  }
  .hero-glow {
    position: absolute;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(240,136,62,0.12) 0%, transparent 70%);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
  }
  .hero-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;

    border: 1px solid rgba(240,136,62,0.3);
    border-radius: 100px;
    padding: 6px 16px;
    font-size: 12px;
    color: var(--accent);
    letter-spacing: 1px;
    margin-bottom: 32px;
    animation: fadeUp 0.6s ease both;
  }
  .pulse {
    width: 8px; height: 8px;
    background: var(--accent);
    border-radius: 50%;
    animation: pulse 2s ease infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }
  h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(48px, 8vw, 96px);
    font-weight: 800;
    line-height: 1;
    letter-spacing: -3px;
    margin-bottom: 24px;
    animation: fadeUp 0.6s ease 0.1s both;
  }
  h1 .highlight {
    color: var(--accent);
    position: relative;
  }
  h1 .highlight::after {
    content: '';
    position: absolute;
    bottom: 4px;
    left: 0; right: 0;
    height: 3px;
    background: var(--accent);
    opacity: 0.3;
    border-radius: 2px;
  }
  .hero-sub {
    font-size: 16px;
    color: var(--muted);
    max-width: 480px;
    line-height: 1.7;
    margin-bottom: 48px;
    animation: fadeUp 0.6s ease 0.2s both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }

    width: 100%;
    max-width: 640px;
    animation: fadeUp 0.6s ease 0.3s both;
    position: relative;
    z-index: 2;
  }
  .search-box {
    display: flex;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    transition: border-color 0.3s, box-shadow 0.3s;
  }
  .search-box:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(240,136,62,0.15), 0 8px 40px rgba(0,0,0,0.4);
  }
  .search-icon {
    padding: 0 16px;
    color: var(--muted);
    display: flex;
    align-items: center;
    font-size: 18px;
  }
  #search-input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 15px;
    padding: 16px 0;
    caret-color: var(--accent);
  }
